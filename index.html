<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ol' Skool Big Time Steak Club — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Alfa+Slab+One&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }


html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  background: #3d0810;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Cormorant Garamond', serif;
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, #7a1828 0%, transparent 65%),
    radial-gradient(ellipse 100% 60% at 50% 100%, #1e0406 0%, transparent 60%),
    repeating-linear-gradient(91deg, transparent 0, transparent 28px, rgba(0,0,0,0.07) 28px, rgba(0,0,0,0.07) 29px),
    linear-gradient(170deg, #6b1220 0%, #4a0c16 30%, #3a0910 60%, #5c1018 100%);
}
.vig {
  position: fixed; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.6) 100%);
}

/* ── STAGE ── */
.stage {
  position: relative; z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  width: 100%;
  /* generous padding so nothing ever clips */
  padding: 60px 5% 40px;
  text-align: center;
  gap: 16px;
}

/* ── THE OL' SKOOL ── */
/* Sits in fixed position at top — never moves, never clips */
.arch-wrap {
  opacity: 0;
  animation: fadeIn 0.1s forwards 0.1s;
  width: auto;
  display: block;
  height: auto;
  overflow: visible;
  padding-top: 20px;
  padding-right: 60px;
}
@keyframes fadeIn { to { opacity: 1; } }

/* ── LOGO — hidden until after words + Club land ── */
.logo-wrap {
  width: clamp(180px, 20vw, 260px);
  opacity: 0;
  overflow: visible;
  margin-bottom: 20px;
  /* take up zero layout space until revealed */
  max-height: 0;
  overflow: visible;
}
.logo-wrap.visible {
  max-height: 400px;
  animation: logoRise 1s cubic-bezier(0.18, 1.1, 0.4, 1) forwards;
}
.logo-wrap img {
  width: 100%;
  height: auto;
  display: block;
  /* transparent PNG — no background, no blend mode needed */
}
@keyframes logoRise {
  0%   { opacity: 0; transform: scale(0.82) translateY(20px); }
  60%  { opacity: 1; }
  85%  { transform: scale(1.03) translateY(-4px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* ── BIG TIME STEAK ── */
.wordmark-stage {
  display: flex;
  flex-direction: row;
  align-items: baseline;
  justify-content: center;
  gap: 0.28em;
  height: auto;
  overflow: visible;
  padding: 20px 0;
}

.drop-word {
  font-family: 'Alfa Slab One', serif;
  /* conservative size — fills screen without ever clipping */
  font-size: clamp(32px, 4.8vw, 72px);
  line-height: 1.15;
  letter-spacing: 0.02em;
  background: linear-gradient(160deg, #f0dc78 0%, #c88c1a 28%, #eece54 56%, #a06810 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8));
  display: inline-block;
  opacity: 0;
  transform: translateY(-180px);
  overflow: visible;
  line-height: 1.3;
  padding: 10px 8px;
}

/* words spaced 0.8s apart — enough time to land before next drops */
.word-big   { animation: wordDrop 0.65s cubic-bezier(0.22,1.4,0.4,1) forwards 1.0s,  wordFlash 0.4s ease forwards 1.62s; }
.word-time  { animation: wordDrop 0.65s cubic-bezier(0.22,1.4,0.4,1) forwards 1.8s,  wordFlash 0.4s ease forwards 2.42s; }
.word-steak { animation: wordDrop 0.65s cubic-bezier(0.22,1.4,0.4,1) forwards 2.6s,  wordFlash 0.4s ease forwards 3.22s; }

@keyframes wordDrop {
  0%   { opacity: 0; transform: translateY(-180px); }
  55%  { opacity: 1; transform: translateY(6px); }
  75%  { transform: translateY(-3px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes wordFlash {
  0%   { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8)) drop-shadow(0 0 32px rgba(255,210,80,0.9)); }
  100% { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8)); }
}

/* ── CLUB — appears immediately after Steak lands ── */
.club-wrap {
  opacity: 0;
  transform: translateY(4px);
  /* Steak finishes at ~3.3s, Club appears right after */
  animation: clubUp 0.5s ease forwards 3.4s;
  margin-bottom: 20px;
}
@keyframes clubUp { to { opacity: 1; transform: translateY(0); } }
.club-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(13px, 1.6vw, 20px);
  font-weight: 600;
  color: #9a6828;
  text-transform: uppercase;
  letter-spacing: 0.55em;
}

/* ── DIVIDER ── */
.divider {
  width: 80px; height: 1px;
  background: linear-gradient(90deg, transparent, #8a5820, transparent);
  margin-bottom: 20px;
  opacity: 0;
  /* appears after logo settles */
  animation: fadeIn 0.7s ease forwards 5.8s;
}

/* ── COMING SOON + EMAIL ── */
.bottom {
  opacity: 0;
  animation: fadeIn 0.7s ease forwards 6.1s;
  text-align: center;
  margin-bottom: 14px;
}
.coming-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; font-weight: 600;
  color: #c89030;
  text-transform: uppercase; letter-spacing: 0.6em;
  margin-bottom: 14px;
}
.email-row {
  display: inline-flex;
  border: 1px solid #8a5c28;
  overflow: visible;
}
.email-row input[type="email"] {
  width: 200px;
  background: rgba(45,6,10,0.95);
  border: none; outline: none;
  color: #d4a040;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  padding: 9px 14px;
  -webkit-appearance: none;
  -webkit-box-shadow: 0 0 0 1000px rgba(45,6,10,0.98) inset;
  -webkit-text-fill-color: #d4a040;
}
.email-row input[type="email"]::placeholder { color: #7a4820; opacity: 1; }
.email-row button {
  background: #6a1e10;
  border: none; border-left: 1px solid #8a5c28;
  color: #f0d878;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.22em; text-transform: uppercase;
  padding: 9px 16px; cursor: pointer; white-space: nowrap;
  transition: background 0.2s;
}
.email-row button:hover { background: #8a2e18; }

/* ── SOCIAL ── */
.social-row {
  display: flex; gap: 1.4rem; justify-content: center;
  margin-bottom: 12px;
  opacity: 0; animation: fadeIn 0.7s ease forwards 6.5s;
}
.social-link {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; font-weight: 600;
  color: #c89030;
  text-transform: uppercase; letter-spacing: 0.28em;
  text-decoration: none;
  border-bottom: 1px solid rgba(200,144,48,0.4); padding-bottom: 1px;
  transition: color 0.2s;
}
.social-link:hover { color: #f0d878; }

/* ── TAGLINE ── */
.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; font-style: italic;
  color: #c89030;
  letter-spacing: 0.13em;
  opacity: 0; animation: fadeIn 0.7s ease forwards 6.8s;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="vig"></div>

<div class="stage">

  <!-- THE OL' SKOOL: writes itself in immediately -->
  <!-- SVG has overflow:visible and padding-top on wrapper so top of cursive never clips -->
  <div class="arch-wrap">
    <svg overflow="visible"
         viewBox="-40 -20 780 130"
         style="width: clamp(300px, 58vw, 680px); height: auto; display: block; margin: 0 auto; overflow: visible;">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#f4e080"/>
          <stop offset="28%"  stop-color="#c89020"/>
          <stop offset="62%"  stop-color="#ecd058"/>
          <stop offset="100%" stop-color="#a47010"/>
        </linearGradient>
        <filter id="goldGlow" x="-15%" y="-40%" width="130%" height="180%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="writeClip">
          <!-- y and height are generous so nothing clips during animation -->
          <rect id="clipRect" x="-20" y="-100" width="0" height="300"/>
        </clipPath>
      </defs>
      <!-- arch path: starts low enough that full ascenders of Great Vibes are visible -->
      <path id="archPath" d="M 40,100 Q 350,0 660,100" fill="none"/>
      <text font-family="Great Vibes, cursive" font-size="56"
            fill="url(#goldGrad)" filter="url(#goldGlow)"
            clip-path="url(#writeClip)">
        <textPath href="#archPath" startOffset="50%" text-anchor="middle">The Ol' Skool</textPath>
      </text>
    </svg>
  </div>

  <!-- LOGO: hidden (max-height:0) until JS fires after Club appears -->
  <!-- Uses osbtsc_logo_transparent.png — transparent background, no mix-blend-mode needed -->
  <div class="logo-wrap" id="logoWrap">
    <img src="osbtsc_logo_transparent.png" alt="The Ol' Skool Big Time Steak Club"/>
  </div>

  <!-- BIG TIME STEAK: three words drop one at a time -->
  <div class="wordmark-stage">
    <span class="drop-word word-big"   id="wBig">Big</span>
    <span class="drop-word word-time"  id="wTime">Time</span>
    <span class="drop-word word-steak" id="wSteak">Steak</span>
  </div>

  <!-- CLUB: appears immediately after Steak lands (3.4s) -->
  <div class="club-wrap"><span class="club-text">Club</span></div>

  <!-- LOGO drops in after Club (4.2s), pushing everything below it down -->
  <!-- divider + bottom fade in after logo settles -->

  <div class="divider"></div>

  <div class="bottom">
    <p class="coming-label">Coming Soon</p>
    <div class="email-row">
      <input type="email" placeholder="Enter your email"/>
      <button type="button">Join the Club</button>
    </div>
  </div>

  <div class="social-row">
    <a class="social-link" href="https://instagram.com" target="_blank">Instagram</a>
    <a class="social-link" href="https://facebook.com" target="_blank">Facebook</a>
    <a class="social-link" href="https://x.com" target="_blank">X</a>
  </div>

  <p class="tagline">Minneapolis, MN &nbsp;·&nbsp; Est. 1999 &nbsp;·&nbsp; Purveyors of Fine Beef Since Day One</p>

</div>

<script>
// THE OL' SKOOL: write-on animation starts immediately, takes 2.4s
(function() {
  var clipRect = document.getElementById('clipRect');
  var totalWidth = 740;
  var duration = 2400;
  var startTime = null;
  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function animate(ts) {
    if (!startTime) startTime = ts;
    var p = Math.min((ts - startTime) / duration, 1);
    clipRect.setAttribute('width', ease(p) * totalWidth);
    if (p < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();

// MORPH: at 3.6s (just after Club appears) — flash BTS words gold then dim them
// This signals the BTS letters are "becoming" the logo
setTimeout(function() {
  ['wBig','wTime','wSteak'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.filter = 'drop-shadow(0 4px 16px rgba(0,0,0,0.8)) drop-shadow(0 0 40px rgba(255,210,80,1))';
    setTimeout(function() {
      el.style.transition = 'opacity 0.9s ease, filter 0.6s ease';
      el.style.opacity = '0.22';
      el.style.filter = 'drop-shadow(0 4px 16px rgba(0,0,0,0.8))';
    }, 200);
  });
}, 3700);

// LOGO RISE: at 4.2s — logo rises up into place between Ol' Skool and wordmark
setTimeout(function() {
  var logo = document.getElementById('logoWrap');
  logo.style.overflow = 'visible';
  logo.classList.add('visible');
}, 4200);

// RESTORE WORDS: after logo settles, words come back to full opacity
setTimeout(function() {
  ['wBig','wTime','wSteak'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.transition = 'opacity 1s ease';
    el.style.opacity = '1';
  });
}, 5500);
</script>

</body>
</html>
