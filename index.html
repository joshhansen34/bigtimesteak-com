<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ol' Skool Big Time Steak Club — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Alfa+Slab+One&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100vh; }

  body {
    background: #3d0810;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, #7a1828 0%, transparent 65%),
      radial-gradient(ellipse 100% 60% at 50% 100%, #1e0406 0%, transparent 60%),
      repeating-linear-gradient(91deg, transparent 0, transparent 28px, rgba(0,0,0,0.07) 28px, rgba(0,0,0,0.07) 29px),
      repeating-linear-gradient(89deg, transparent 0, transparent 60px, rgba(255,255,255,0.015) 60px, rgba(255,255,255,0.015) 61px),
      linear-gradient(170deg, #6b1220 0%, #4a0c16 30%, #3a0910 60%, #5c1018 100%);
  }

  .vig {
    position: fixed; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.65) 100%);
  }

  .stage {
    position: relative; z-index: 2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
    text-align: center; width: 100%;
  }

  /* ── THE OL' SKOOL ARCH ── */
  .arch-wrap { opacity: 0; animation: fadeIn 0.1s forwards 0.2s; }
  @keyframes fadeIn { to { opacity: 1; } }

  /* ── LOGO ── */
  .logo-wrap {
    width: clamp(140px, 20vw, 220px);
    aspect-ratio: 2 / 3;
    margin: 0.5rem 0;
    opacity: 0;
    animation: logoIn 1s cubic-bezier(0.18, 1.1, 0.4, 1) forwards 2.6s;
    mix-blend-mode: screen;
    filter: drop-shadow(0 8px 30px rgba(0,0,0,0.8));
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  @keyframes logoIn {
    0%   { opacity: 0; transform: scale(0.85); }
    60%  { opacity: 1; transform: scale(1.04); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* ── BIG TIME STEAK ── */
  .wordmark-stage {
    display: flex; flex-direction: row;
    align-items: baseline; justify-content: center;
    gap: 0.5em; margin-top: 0.1rem; white-space: nowrap;
  }
  .drop-word {
    font-family: 'Alfa Slab One', serif;
    font-size: clamp(24px, 5.5vw, 72px);
    line-height: 1; letter-spacing: 0.04em;
    background: linear-gradient(160deg, #f0dc78 0%, #c88c1a 30%, #eece54 58%, #a06810 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    filter: drop-shadow(0 4px 14px rgba(0,0,0,0.7));
    display: inline-block; opacity: 0; transform: translateY(-100px);
  }
  .word-big   { animation: wordDrop 0.55s cubic-bezier(0.22,1.4,0.4,1) forwards 3.4s, flash 0.35s ease forwards 3.92s; }
  .word-time  { animation: wordDrop 0.55s cubic-bezier(0.22,1.4,0.4,1) forwards 4.1s, flash 0.35s ease forwards 4.62s; }
  .word-steak { animation: wordDrop 0.6s  cubic-bezier(0.22,1.4,0.4,1) forwards 4.8s, flash 0.35s ease forwards 5.37s; }
  @keyframes wordDrop {
    0%   { opacity: 0; transform: translateY(-100px); }
    55%  { opacity: 1; transform: translateY(5px); }
    75%  { transform: translateY(-3px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes flash {
    0%   { filter: drop-shadow(0 4px 14px rgba(0,0,0,0.7)) drop-shadow(0 0 28px rgba(255,200,80,0.6)); }
    100% { filter: drop-shadow(0 4px 14px rgba(0,0,0,0.7)); }
  }

  /* ── CLUB ── */
  .club-wrap {
    opacity: 0; transform: translateY(5px);
    animation: clubUp 0.6s ease forwards 5.5s;
    margin-top: 0.35rem;
  }
  @keyframes clubUp { to { opacity: 1; transform: translateY(0); } }
  .club-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(11px, 1.8vw, 18px); font-weight: 600;
    color: #9a6828; text-transform: uppercase; letter-spacing: 0.55em;
  }

  /* ── DIVIDER ── */
  .divider {
    width: 90px; height: 1px;
    background: linear-gradient(90deg, transparent, #8a5820, transparent);
    margin: 1.4rem auto 1.1rem;
    opacity: 0; animation: fadeIn 0.7s ease forwards 6.1s;
  }

  /* ── COMING SOON + EMAIL ── */
  .bottom { opacity: 0; animation: fadeIn 0.8s ease forwards 6.4s; text-align: center; }
  .coming-label {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; font-weight: 600; color: #7a4c20;
    text-transform: uppercase; letter-spacing: 0.65em; margin-bottom: 0.9rem;
  }

  /* Email row — inline, transparent, no browser override */
  .email-row {
    display: inline-flex;
    border: 1px solid #7a4c20;
    overflow: hidden;
  }
  .email-row input[type="email"] {
    width: 200px;
    background: rgba(61,8,16,0.6);
    border: none; outline: none;
    color: #c8901a;
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    padding: 9px 14px;
    -webkit-appearance: none;
    /* override autofill yellow */
    -webkit-box-shadow: 0 0 0 1000px rgba(61,8,16,0.95) inset;
    -webkit-text-fill-color: #c8901a;
  }
  .email-row input[type="email"]::placeholder { color: #6a4020; opacity: 1; }
  .email-row button {
    background: transparent;
    border: none; border-left: 1px solid #7a4c20;
    color: #c8901a;
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.2em; text-transform: uppercase;
    padding: 9px 16px; cursor: pointer; white-space: nowrap;
    transition: color 0.2s, background 0.2s;
  }
  .email-row button:hover { background: rgba(122,76,32,0.25); color: #e8b030; }

  /* ── SOCIAL ── */
  .social-row {
    display: flex; gap: 1.4rem; justify-content: center;
    margin-top: 1.1rem;
    opacity: 0; animation: fadeIn 0.7s ease forwards 6.9s;
  }
  .social-link {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; font-weight: 600; color: #5a3818;
    text-transform: uppercase; letter-spacing: 0.3em;
    text-decoration: none; transition: color 0.2s;
    border-bottom: 1px solid rgba(90,56,24,0.3); padding-bottom: 1px;
  }
  .social-link:hover { color: #9a6828; }

  /* ── TAGLINE ── */
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-size: 11px; color: #3a2010;
    letter-spacing: 0.16em; margin-top: 1.4rem; font-style: italic;
    opacity: 0; animation: fadeIn 0.7s ease forwards 7.3s;
  }
</style>
</head>
<body>

<div class="bg"></div>
<div class="vig"></div>

<div class="stage">

  <!-- THE OL' SKOOL — arched, writes itself in -->
  <div class="arch-wrap">
    <svg width="520" height="76" viewBox="0 0 520 76" overflow="visible"
         style="width: clamp(260px, 52vw, 520px);">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#f4e080"/>
          <stop offset="28%"  stop-color="#c89020"/>
          <stop offset="62%"  stop-color="#ecd058"/>
          <stop offset="100%" stop-color="#a47010"/>
        </linearGradient>
        <filter id="goldGlow">
          <feGaussianBlur stdDeviation="2" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="writeClip">
          <rect id="writeRect" x="-10" y="-60" height="200" width="0"/>
        </clipPath>
      </defs>
      <path id="archPath" d="M 20,66 Q 260,-20 500,66" fill="none"/>
      <text font-family="Great Vibes, cursive" font-size="52"
            fill="url(#goldGrad)" filter="url(#goldGlow)" clip-path="url(#writeClip)">
        <textPath href="#archPath" startOffset="50%" text-anchor="middle">The Ol' Skool</textPath>
      </text>
    </svg>
  </div>

  <!-- LOGO -->
  <!-- NOTE FOR CLAUDE CODE: place osbtsc_logo.png in same directory as this file -->
  <div class="logo-wrap">
    <img src="osbtsc_logo.png" alt="The Ol' Skool Big Time Steak Club Logo"/>
  </div>

  <!-- BIG TIME STEAK — drops in one word at a time -->
  <div class="wordmark-stage">
    <span class="drop-word word-big">Big</span>
    <span class="drop-word word-time">Time</span>
    <span class="drop-word word-steak">Steak</span>
  </div>

  <div class="club-wrap">
    <span class="club-text">Club</span>
  </div>

  <div class="divider"></div>

  <div class="bottom">
    <p class="coming-label">Coming Soon</p>
    <div class="email-row">
      <input type="email" placeholder="Enter your email"/>
      <button type="button">Join the Club</button>
    </div>
  </div>

  <div class="social-row">
    <a class="social-link" href="https://instagram.com" target="_blank">Instagram</a>
    <a class="social-link" href="https://facebook.com" target="_blank">Facebook</a>
    <a class="social-link" href="https://x.com" target="_blank">X</a>
  </div>

  <p class="tagline">Minneapolis, MN &nbsp;·&nbsp; Est. 1999 &nbsp;·&nbsp; Purveyors of Fine Beef Since Day One</p>

</div>
<script>
  (function() {
    var rect = document.getElementById('writeRect');
    var duration = 2200;
    var delay = 300;
    var startTime = null;
    function step(ts) {
      if (!startTime) startTime = ts;
      var elapsed = ts - startTime;
      var progress = Math.min(elapsed / duration, 1);
      // ease-in-out cubic
      var eased = progress < 0.5
        ? 4 * progress * progress * progress
        : 1 - Math.pow(-2 * progress + 2, 3) / 2;
      rect.setAttribute('width', eased * 600);
      if (progress < 1) requestAnimationFrame(step);
    }
    setTimeout(function() { requestAnimationFrame(step); }, delay);
  })();
</script>
</body>
</html>
