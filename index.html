<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ol' Skool Big Time Steak Club — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Alfa+Slab+One&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%;
  min-height: 100vh;
  overflow-x: hidden;
}

body {
  background: #3d0810;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Cormorant Garamond', serif;
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, #7a1828 0%, transparent 65%),
    radial-gradient(ellipse 100% 60% at 50% 100%, #1e0406 0%, transparent 60%),
    repeating-linear-gradient(91deg, transparent 0, transparent 28px, rgba(0,0,0,0.07) 28px, rgba(0,0,0,0.07) 29px),
    linear-gradient(170deg, #6b1220 0%, #4a0c16 30%, #3a0910 60%, #5c1018 100%);
}
.vig {
  position: fixed; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.6) 100%);
}

/* ── MAIN STAGE ── */
.stage {
  position: relative; z-index: 2;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  width: 100%;
  padding: 3rem 5%;
  text-align: center;
  overflow: visible;
}

/* ── STEP 1: THE OL' SKOOL ── */
.arch-wrap {
  opacity: 0;
  animation: fadeIn 0.1s forwards 0.1s;
  width: 100%;
  overflow: visible;
  margin-bottom: 1.5rem;
}
@keyframes fadeIn { to { opacity: 1; } }

/* ── STEP 5: LOGO — hidden until after BTS drops ── */
.logo-wrap {
  width: clamp(180px, 22vw, 280px);
  opacity: 0;
  margin-bottom: 1rem;
  /* completely removed from layout until JS unhides it */
  max-height: 0;
  overflow: hidden;
  transition: max-height 0s;
}
.logo-wrap img {
  width: 100%;
  height: auto;
  display: block;
  /* transparent PNG — no background needed */
}
.logo-wrap.visible {
  max-height: 400px;
  animation: logoRise 1.2s cubic-bezier(0.18, 1.1, 0.4, 1) forwards;
}
@keyframes logoRise {
  0%   { opacity: 0; transform: translateY(30px) scale(0.8); }
  60%  { opacity: 1; }
  85%  { transform: translateY(-5px) scale(1.03); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── STEPS 2-4: BIG TIME STEAK ── */
.wordmark-stage {
  display: flex;
  flex-direction: row;
  align-items: baseline;
  justify-content: center;
  gap: 0.3em;
  width: 100%;
  overflow: visible;
  padding: 0 2%;
}

.drop-word {
  font-family: 'Alfa Slab One', serif;
  /* size is relative to viewport, never clips */
  font-size: clamp(36px, 5.5vw, 80px);
  line-height: 1.1;
  letter-spacing: 0.02em;
  background: linear-gradient(160deg, #f0dc78 0%, #c88c1a 28%, #eece54 56%, #a06810 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8));
  display: inline-block;
  opacity: 0;
  transform: translateY(-200px);
  overflow: visible;
  /* extra padding so descenders/ascenders never clip */
  padding: 0.1em 0.05em;
}

.word-big   { animation: wordDrop 0.6s cubic-bezier(0.22,1.4,0.4,1) forwards 2.8s,  wordFlash 0.4s ease forwards 3.37s; }
.word-time  { animation: wordDrop 0.6s cubic-bezier(0.22,1.4,0.4,1) forwards 3.6s,  wordFlash 0.4s ease forwards 4.17s; }
.word-steak { animation: wordDrop 0.65s cubic-bezier(0.22,1.4,0.4,1) forwards 4.4s, wordFlash 0.4s ease forwards 5.02s; }

@keyframes wordDrop {
  0%   { opacity: 0; transform: translateY(-200px); }
  55%  { opacity: 1; transform: translateY(7px); }
  75%  { transform: translateY(-4px); }
  100% { opacity: 1; transform: translateY(0); }
}
@keyframes wordFlash {
  0%   { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8)) drop-shadow(0 0 32px rgba(255,210,80,0.9)); }
  100% { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8)); }
}

/* ── CLUB ── */
.club-wrap {
  opacity: 0; transform: translateY(5px);
  animation: clubUp 0.7s ease forwards 7.0s;
  margin-top: 0.4rem;
}
@keyframes clubUp { to { opacity: 1; transform: translateY(0); } }
.club-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(13px, 1.8vw, 22px);
  font-weight: 600;
  color: #9a6828;
  text-transform: uppercase;
  letter-spacing: 0.55em;
}

/* ── DIVIDER ── */
.divider {
  width: 90px; height: 1px;
  background: linear-gradient(90deg, transparent, #8a5820, transparent);
  margin: 1.4rem auto 1.1rem;
  opacity: 0;
  animation: fadeIn 0.7s ease forwards 7.5s;
}

/* ── COMING SOON + EMAIL ── */
.bottom {
  opacity: 0;
  animation: fadeIn 0.8s ease forwards 7.8s;
  text-align: center;
}
.coming-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; font-weight: 600;
  color: #c89030;
  text-transform: uppercase; letter-spacing: 0.65em;
  margin-bottom: 1rem;
}
.email-row {
  display: inline-flex;
  border: 1px solid #8a5c28;
  overflow: hidden;
}
.email-row input[type="email"] {
  width: 210px;
  background: rgba(45,6,10,0.95);
  border: none; outline: none;
  color: #d4a040;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  padding: 10px 16px;
  -webkit-appearance: none;
  -webkit-box-shadow: 0 0 0 1000px rgba(45,6,10,0.98) inset;
  -webkit-text-fill-color: #d4a040;
}
.email-row input[type="email"]::placeholder { color: #7a4820; opacity: 1; }
.email-row button {
  background: #6a1e10;
  border: none; border-left: 1px solid #8a5c28;
  color: #f0d878;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.25em; text-transform: uppercase;
  padding: 10px 18px; cursor: pointer; white-space: nowrap;
  transition: background 0.2s;
}
.email-row button:hover { background: #8a2e18; }

/* ── SOCIAL ── */
.social-row {
  display: flex; gap: 1.4rem; justify-content: center;
  margin-top: 1.1rem;
  opacity: 0; animation: fadeIn 0.7s ease forwards 8.3s;
}
.social-link {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; font-weight: 600;
  color: #c89030;
  text-transform: uppercase; letter-spacing: 0.3em;
  text-decoration: none;
  border-bottom: 1px solid rgba(200,144,48,0.4); padding-bottom: 1px;
  transition: color 0.2s;
}
.social-link:hover { color: #f0d878; }

/* ── TAGLINE ── */
.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px; font-style: italic;
  color: #c89030;
  letter-spacing: 0.14em; margin-top: 1.2rem;
  opacity: 0; animation: fadeIn 0.7s ease forwards 8.7s;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="vig"></div>

<div class="stage">

  <!-- STEP 1: The Ol' Skool writes itself in -->
  <div class="arch-wrap">
    <svg id="archSvg" overflow="visible"
         viewBox="0 0 700 90"
         style="width: clamp(300px, 60vw, 700px); height: auto; display: block; margin: 0 auto; overflow: visible;">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#f4e080"/>
          <stop offset="28%"  stop-color="#c89020"/>
          <stop offset="62%"  stop-color="#ecd058"/>
          <stop offset="100%" stop-color="#a47010"/>
        </linearGradient>
        <filter id="goldGlow" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="writeClip">
          <rect id="clipRect" x="-10" y="-80" width="0" height="250"/>
        </clipPath>
      </defs>
      <path id="archPath" d="M 20,84 Q 350,-18 680,84" fill="none"/>
      <text font-family="Great Vibes, cursive" font-size="68"
            fill="url(#goldGrad)" filter="url(#goldGlow)"
            clip-path="url(#writeClip)">
        <textPath href="#archPath" startOffset="50%" text-anchor="middle">The Ol' Skool</textPath>
      </text>
    </svg>
  </div>

  <!-- STEP 5: Logo appears ABOVE wordmark after BTS morph (hidden until JS fires) -->
  <!-- osbtsc_logo_transparent.png must be in same directory — transparent background already -->
  <div class="logo-wrap" id="logoWrap">
    <img src="osbtsc_logo_transparent.png" alt="The Ol' Skool Big Time Steak Club"/>
  </div>

  <!-- STEPS 2-4: Big, Time, Steak drop in one at a time -->
  <div class="wordmark-stage">
    <span class="drop-word word-big"   id="wBig">Big</span>
    <span class="drop-word word-time"  id="wTime">Time</span>
    <span class="drop-word word-steak" id="wSteak">Steak</span>
  </div>

  <!-- STEP 6: Club -->
  <div class="club-wrap"><span class="club-text">Club</span></div>

  <div class="divider"></div>

  <div class="bottom">
    <p class="coming-label">Coming Soon</p>
    <div class="email-row">
      <input type="email" placeholder="Enter your email"/>
      <button type="button">Join the Club</button>
    </div>
  </div>

  <div class="social-row">
    <a class="social-link" href="https://instagram.com" target="_blank">Instagram</a>
    <a class="social-link" href="https://facebook.com" target="_blank">Facebook</a>
    <a class="social-link" href="https://x.com" target="_blank">X</a>
  </div>

  <p class="tagline">Minneapolis, MN &nbsp;·&nbsp; Est. 1999 &nbsp;·&nbsp; Purveyors of Fine Beef Since Day One</p>

</div>

<script>
// STEP 1: Animate "The Ol' Skool" writing itself in — starts immediately, 2.4s duration
(function() {
  var clipRect = document.getElementById('clipRect');
  var totalWidth = 720;
  var duration = 2400;
  var startTime = null;
  function ease(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
  function animate(ts) {
    if (!startTime) startTime = ts;
    var p = Math.min((ts - startTime) / duration, 1);
    clipRect.setAttribute('width', ease(p) * totalWidth);
    if (p < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
})();

// STEP 5: At 5.3s — flash BTS words gold then dim them (morph effect)
// At 5.6s — logo rises up into place above wordmark
setTimeout(function() {
  ['wBig','wTime','wSteak'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.filter = 'drop-shadow(0 4px 16px rgba(0,0,0,0.8)) drop-shadow(0 0 40px rgba(255,210,80,1))';
    setTimeout(function() {
      el.style.transition = 'opacity 0.9s ease, filter 0.6s ease';
      el.style.opacity = '0.25';
      el.style.filter = 'drop-shadow(0 4px 16px rgba(0,0,0,0.8))';
    }, 180);
  });
}, 5300);

setTimeout(function() {
  var logo = document.getElementById('logoWrap');
  logo.classList.add('visible');
}, 5600);

// STEP 7: Restore words to full opacity after logo settles
setTimeout(function() {
  ['wBig','wTime','wSteak'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.transition = 'opacity 1s ease';
    el.style.opacity = '1';
  });
}, 7100);
</script>

</body>
</html>
