<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Ol' Skool Big Time Steak Club — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Alfa+Slab+One&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; min-height: 100vh; }

body {
  background: #3d0810;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh;
  font-family: 'Cormorant Garamond', serif;
  overflow-x: hidden;
}

.bg {
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, #7a1828 0%, transparent 65%),
    radial-gradient(ellipse 100% 60% at 50% 100%, #1e0406 0%, transparent 60%),
    repeating-linear-gradient(91deg, transparent 0, transparent 28px, rgba(0,0,0,0.07) 28px, rgba(0,0,0,0.07) 29px),
    linear-gradient(170deg, #6b1220 0%, #4a0c16 30%, #3a0910 60%, #5c1018 100%);
}
.vig {
  position: fixed; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, transparent 20%, rgba(0,0,0,0.6) 100%);
}

.stage {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; padding: 2rem 4rem;
  text-align: center; width: 100%;
  gap: 0;
}

/* ── STEP 1: "The Ol' Skool" scrawls in FIRST ── */
.arch-wrap {
  opacity: 0;
  animation: fadeIn 0.1s forwards 0.1s;
  margin-bottom: 0.6rem;
  line-height: 1;
}
@keyframes fadeIn { to { opacity: 1; } }

/* ── STEP 2-4: Big, Time, Steak drop in one at a time ── */
.wordmark-stage {
  display: flex;
  align-items: baseline;
  justify-content: center;
  gap: 0.2em;
  white-space: nowrap;
  overflow: visible;
  padding: 0 0.5rem;
}

.drop-word {
  font-family: 'Alfa Slab One', serif;
  font-size: clamp(30px, 6.5vw, 86px);
  line-height: 1;
  letter-spacing: 0.03em;
  background: linear-gradient(160deg, #f0dc78 0%, #c88c1a 28%, #eece54 56%, #a06810 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8));
  display: inline-block;
  opacity: 0;
  transform: translateY(-220px) scaleY(1.12);
  transition: opacity 0.8s ease, filter 0.5s ease;
}

/* Big drops at 2.8s (after Ol Skool finishes writing ~2.5s) */
.word-big   { animation: wordDrop 0.6s cubic-bezier(0.22,1.4,0.4,1) forwards 2.8s,  wordFlash 0.4s ease forwards 3.37s; }
.word-time  { animation: wordDrop 0.6s cubic-bezier(0.22,1.4,0.4,1) forwards 3.6s,  wordFlash 0.4s ease forwards 4.17s; }
.word-steak { animation: wordDrop 0.65s cubic-bezier(0.22,1.4,0.4,1) forwards 4.4s, wordFlash 0.4s ease forwards 5.02s; }

@keyframes wordDrop {
  0%   { opacity: 0; transform: translateY(-220px) scaleY(1.12); }
  55%  { opacity: 1; transform: translateY(8px) scaleY(0.96); }
  75%  { transform: translateY(-4px) scaleY(1.02); }
  100% { opacity: 1; transform: translateY(0) scaleY(1); }
}
@keyframes wordFlash {
  0%   { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8)) drop-shadow(0 0 32px rgba(255,210,80,0.8)); }
  100% { filter: drop-shadow(0 4px 16px rgba(0,0,0,0.8)); }
}

/* ── STEP 5: BTS morph — words dim, logo rises in ── */
/* Words dim at 5.3s via JS */
/* Logo appears at 5.6s */

.logo-wrap {
  width: clamp(140px, 20vw, 220px);
  aspect-ratio: 2 / 3;
  opacity: 0;
  order: -1; /* logo sits above wordmark in DOM flow */
  margin-bottom: 0.4rem;
  animation: logoRise 1.4s cubic-bezier(0.18, 1.1, 0.4, 1) forwards 5.6s;
  background: transparent;
}
.logo-wrap img {
  width: 100%; height: 100%;
  object-fit: contain;
  mix-blend-mode: screen;
  filter: drop-shadow(0 6px 28px rgba(0,0,0,0.95));
}
@keyframes logoRise {
  0%   { opacity: 0; transform: translateY(40px) scale(0.75); }
  50%  { opacity: 1; }
  80%  { transform: translateY(-6px) scale(1.04); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── CLUB ── */
.club-wrap {
  opacity: 0; transform: translateY(5px);
  animation: clubUp 0.7s ease forwards 7.0s;
  margin-top: 0.25rem;
}
@keyframes clubUp { to { opacity: 1; transform: translateY(0); } }
.club-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(12px, 1.8vw, 20px);
  font-weight: 600; color: #9a6828;
  text-transform: uppercase; letter-spacing: 0.55em;
}

/* ── DIVIDER ── */
.divider {
  width: 90px; height: 1px;
  background: linear-gradient(90deg, transparent, #8a5820, transparent);
  margin: 1.4rem auto 1.1rem;
  opacity: 0; animation: fadeIn 0.7s ease forwards 7.5s;
}

/* ── BOTTOM ── */
.bottom { opacity: 0; animation: fadeIn 0.8s ease forwards 7.8s; text-align: center; }
.coming-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; font-weight: 600;
  color: #9a6828;
  text-transform: uppercase; letter-spacing: 0.65em;
  margin-bottom: 0.9rem;
}
.email-row {
  display: inline-flex;
  border: 1px solid #8a5c28;
  overflow: hidden;
}
.email-row input[type="email"] {
  width: 205px;
  background: rgba(50,8,12,0.8);
  border: none; outline: none;
  color: #d4a040;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  padding: 10px 16px;
  -webkit-appearance: none;
  -webkit-box-shadow: 0 0 0 1000px rgba(45,6,10,0.98) inset;
  -webkit-text-fill-color: #d4a040;
}
.email-row input[type="email"]::placeholder { color: #7a4820; opacity: 1; }
.email-row button {
  background: #6a1e10;
  border: none; border-left: 1px solid #8a5c28;
  color: #f0d878;
  font-family: 'Cormorant Garamond', serif;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.25em; text-transform: uppercase;
  padding: 10px 18px; cursor: pointer; white-space: nowrap;
  transition: background 0.2s;
}
.email-row button:hover { background: #8a2e18; }

/* ── SOCIAL ── */
.social-row {
  display: flex; gap: 1.4rem; justify-content: center;
  margin-top: 1.1rem;
  opacity: 0; animation: fadeIn 0.7s ease forwards 8.3s;
}
.social-link {
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; font-weight: 600;
  color: #8a6030;
  text-transform: uppercase; letter-spacing: 0.3em;
  text-decoration: none; transition: color 0.2s;
  border-bottom: 1px solid rgba(138,96,48,0.4); padding-bottom: 1px;
}
.social-link:hover { color: #c89030; }

/* ── TAGLINE ── */
.tagline {
  font-family: 'Cormorant Garamond', serif;
  font-size: 12px; font-style: italic;
  color: #8a6030;
  letter-spacing: 0.14em; margin-top: 1.2rem;
  opacity: 0; animation: fadeIn 0.7s ease forwards 8.7s;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="vig"></div>

<div class="stage">

  <!-- STEP 1: The Ol' Skool scrawls in first -->
  <div class="arch-wrap">
    <svg id="archSvg" overflow="visible"
         viewBox="0 0 560 82"
         style="width: clamp(280px, 54vw, 560px); height: auto; display: block;">
      <defs>
        <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%"   stop-color="#f4e080"/>
          <stop offset="28%"  stop-color="#c89020"/>
          <stop offset="62%"  stop-color="#ecd058"/>
          <stop offset="100%" stop-color="#a47010"/>
        </linearGradient>
        <filter id="goldGlow">
          <feGaussianBlur stdDeviation="2.5" result="b"/>
          <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <clipPath id="writeClip">
          <rect id="clipRect" x="-10" y="-80" width="0" height="200"/>
        </clipPath>
      </defs>
      <path id="archPath" d="M 20,76 Q 280,-16 540,76" fill="none"/>
      <text font-family="Great Vibes, cursive" font-size="60"
            fill="url(#goldGrad)" filter="url(#goldGlow)"
            clip-path="url(#writeClip)">
        <textPath href="#archPath" startOffset="50%" text-anchor="middle">The Ol' Skool</textPath>
      </text>
    </svg>
  </div>

  <!-- STEP 5: Logo rises up from wordmark after BTS morph -->
  <!-- NOTE FOR CLAUDE CODE: osbtsc_logo.png must be in same directory as this file -->
  <div class="logo-wrap" id="logoWrap">
    <img src="osbtsc_logo.png" alt="The Ol' Skool Big Time Steak Club Logo"/>
  </div>

  <!-- STEPS 2-4: Big, Time, Steak drop in one at a time -->
  <div class="wordmark-stage">
    <span class="drop-word word-big"   id="wBig">Big</span>
    <span class="drop-word word-time"  id="wTime">Time</span>
    <span class="drop-word word-steak" id="wSteak">Steak</span>
  </div>

  <!-- STEP 6: Club fades in -->
  <div class="club-wrap"><span class="club-text">Club</span></div>

  <div class="divider"></div>

  <div class="bottom">
    <p class="coming-label">Coming Soon</p>
    <div class="email-row">
      <input type="email" placeholder="Enter your email"/>
      <button type="button">Join the Club</button>
    </div>
  </div>

  <div class="social-row">
    <a class="social-link" href="https://instagram.com" target="_blank">Instagram</a>
    <a class="social-link" href="https://facebook.com" target="_blank">Facebook</a>
    <a class="social-link" href="https://x.com" target="_blank">X</a>
  </div>

  <p class="tagline">Minneapolis, MN &nbsp;·&nbsp; Est. 1999 &nbsp;·&nbsp; Purveyors of Fine Beef Since Day One</p>

</div>

<script>
// ── Animate "The Ol' Skool" writing itself in ──
// Starts immediately, takes 2.4s — Big drops at 2.8s
(function() {
  var clipRect = document.getElementById('clipRect');
  var totalWidth = 580;
  var duration = 2400; // ms
  var startTime = null;

  function easeInOut(t) {
    return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
  }

  function animate(ts) {
    if (!startTime) startTime = ts;
    var elapsed = ts - startTime;
    var progress = Math.min(elapsed / duration, 1);
    var eased = easeInOut(progress);
    clipRect.setAttribute('width', eased * totalWidth);
    if (progress < 1) requestAnimationFrame(animate);
  }

  // Start writing immediately
  requestAnimationFrame(animate);
})();

// ── Morph: dim BTS words as logo rises ──
// Steak finishes landing ~5.1s, so dim at 5.3s
setTimeout(function() {
  ['wBig', 'wTime', 'wSteak'].forEach(function(id) {
    var el = document.getElementById(id);
    // Brief gold flash
    el.style.filter = 'drop-shadow(0 4px 16px rgba(0,0,0,0.8)) drop-shadow(0 0 40px rgba(255,210,80,1))';
    setTimeout(function() {
      el.style.transition = 'opacity 0.9s ease, filter 0.6s ease';
      el.style.opacity = '0.28';
      el.style.filter = 'drop-shadow(0 4px 16px rgba(0,0,0,0.8))';
    }, 150);
  });
}, 5300);

// ── Restore words to full opacity after logo is settled ──
setTimeout(function() {
  ['wBig', 'wTime', 'wSteak'].forEach(function(id) {
    var el = document.getElementById(id);
    el.style.transition = 'opacity 1s ease';
    el.style.opacity = '1';
  });
}, 7100);
</script>

</body>
</html>
